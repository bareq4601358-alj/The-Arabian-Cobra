<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>The Arabian Cobra 🐍</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      padding: 16px;
      background: #111;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    .game-shell {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .game-header {
      width: min(95vw, 740px);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #7cfc00;
      text-shadow: 0 0 12px rgba(124, 252, 0, 0.35);
      text-align: center;
      width: 100%;
    }

    .hud {
      width: min(95vw, 740px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .hud span { opacity: 0.92; }

    .board-wrap {
      position: relative;
      border: 3px solid #444;
      border-radius: 4px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.55);
      background: #000;
      line-height: 0;
    }

    canvas {
      display: block;
      outline: none;
      max-width: 95vw;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.72);
      flex-direction: column;
      text-align: center;
      padding: 24px;
    }

    .overlay.visible { display: flex; }

    .overlay h2 {
      margin: 0 0 8px;
      font-size: 2rem;
      color: #7cfc00;
    }

    .overlay p {
      margin: 0 0 18px;
      font-size: 1.15rem;
      line-height: 1.5;
    }

    .overlay button {
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      background: #7cfc00;
      color: #111;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .overlay button:hover { background: #9dff33; }

    .controls {
      display: none;
      margin-top: 14px;
      grid-template-columns: repeat(3, minmax(72px, 1fr));
      grid-template-rows: repeat(3, minmax(72px, 1fr));
      gap: 8px;
      width: min(100%, 280px);
    }

    .btn {
      background: rgba(124, 252, 0, 0.14);
      color: #7cfc00;
      border: 2px solid rgba(124, 252, 0, 0.5);
      border-radius: 12px;
      font-size: 1.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      cursor: pointer;
      min-height: 72px;
      min-width: 72px;
      padding: 0;
      font-family: inherit;
      line-height: 1;
    }

    .btn:active,
    .btn.pressed {
      background: rgba(124, 252, 0, 0.42);
      transform: scale(0.96);
    }

    .btn-center {
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.65);
      border-color: rgba(255, 255, 255, 0.18);
      pointer-events: none;
      cursor: default;
    }

    /* Mobile-only layout and controls */
    @media (max-width: 768px), (hover: none) and (pointer: coarse) {
      html,
      body,
      .game-shell,
      .game-shell * {
        touch-action: none;
        -ms-touch-action: none;
      }

      html {
        overscroll-behavior: none;
      }

      body {
        padding: 0;
        align-items: stretch;
        justify-content: flex-start;
        min-height: 100vh;
        min-height: 100dvh;
        touch-action: none;
        overflow: hidden;
        overscroll-behavior: none;
      }

      .game-shell {
        width: 100%;
        max-width: 760px;
        margin: 0 auto;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        touch-action: none;
        padding: max(4px, env(safe-area-inset-top)) max(4px, env(safe-area-inset-right)) max(2px, env(safe-area-inset-bottom)) max(4px, env(safe-area-inset-left));
      }

      .game-header {
        width: 100%;
        text-align: center;
        flex: 0 0 auto;
      }

      h1 {
        font-size: clamp(1.55rem, 6vw, 2.15rem);
        margin-bottom: 6px;
      }

      .hud {
        width: 100%;
        font-size: clamp(0.9rem, 3.2vw, 1.05rem);
        margin-bottom: 4px;
        padding: 0 2px;
      }

      .board-wrap {
        flex: 0 1 auto;
        align-self: center;
        margin: 0 auto;
        min-height: 0;
        max-width: 100%;
        overflow: hidden;
      }

      canvas {
        touch-action: none;
        display: block;
        max-width: 100%;
        max-height: 100%;
      }

      .controls {
        display: grid;
        flex: 0 0 auto;
        margin-top: auto;
        align-self: center;
        padding-top: 10px;
        grid-template-columns: repeat(3, minmax(58px, 1fr));
        grid-template-rows: repeat(3, minmax(58px, 1fr));
        gap: 6px;
        width: min(100%, 240px);
      }

      .btn {
        min-height: 58px;
        min-width: 58px;
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="game-header">
      <h1>The Arabian Cobra 🐍</h1>

      <div class="hud">
        <span id="scoreDisplay">Score: 0</span>
        <span id="bestDisplay">Best: 0</span>
      </div>
    </div>

    <div class="board-wrap">
      <canvas id="gameCanvas" tabindex="0"></canvas>

      <div class="overlay visible" id="startScreen">
        <h2>The Arabian Cobra</h2>
        <p id="startInstructions">Use arrow keys or swipe to move.<br>Eat apples to grow. Don't hit walls or your tail!</p>
        <button id="startBtn">Play</button>
      </div>

      <div class="overlay" id="gameOverScreen">
        <h2>Game Over</h2>
        <p id="finalScore"></p>
        <button id="restartBtn">Play Again</button>
      </div>
    </div>

    <div class="controls" id="mobileControls" aria-label="Direction controls">
      <div></div>
      <button type="button" class="btn" data-dir="up" aria-label="Up">↑</button>
      <div></div>
      <button type="button" class="btn" data-dir="left" aria-label="Left">←</button>
      <div class="btn btn-center" aria-hidden="true"></div>
      <button type="button" class="btn" data-dir="right" aria-label="Right">→</button>
      <div></div>
      <button type="button" class="btn" data-dir="down" aria-label="Down">↓</button>
      <div></div>
    </div>
  </div>

  <script>
    const DESKTOP_COLS = 37;
    const DESKTOP_ROWS = 27;
    const MOBILE_TARGET_CELL = 17;
    let COLS = DESKTOP_COLS;
    let ROWS = DESKTOP_ROWS;
    const GROWTH_PER_APPLE = 4;
    const MAX_SCORE = 999;
    const BASE_TICK_MS = 88;
    const MIN_TICK_MS = 52;

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const bestDisplay = document.getElementById("bestDisplay");
    const startScreen = document.getElementById("startScreen");
    const gameOverScreen = document.getElementById("gameOverScreen");
    const finalScoreEl = document.getElementById("finalScore");
    const mobileControls = document.getElementById("mobileControls");

    const isMobileLayout = () => window.matchMedia("(max-width: 768px), (hover: none) and (pointer: coarse)").matches;
    let layoutPass = 0;
    let layoutTimer = null;
    let playCellSize = null;

    function getMobileEntityScale() {
      // On mobile the grid uses larger cells; scale the snake down so its
      // on-screen size matches the original look. Desktop is unchanged (1).
      return isMobileLayout() ? 0.6 : 1;
    }

    function getMobileAppleScale() {
      // Apple sits a bit larger than the snake's scale so it stays easy to
      // see, without becoming oversized. Desktop is unchanged (1).
      return isMobileLayout() ? 0.82 : 1;
    }

    function syncHudWidth(px) {
      const hud = document.querySelector(".hud");
      if (!hud) return;
      if (px && isMobileLayout()) {
        hud.style.width = `${px}px`;
        hud.style.marginLeft = "auto";
        hud.style.marginRight = "auto";
      } else {
        hud.style.width = "";
        hud.style.marginLeft = "";
        hud.style.marginRight = "";
      }
    }

    function configureGrid() {
      if (!isMobileLayout()) {
        COLS = DESKTOP_COLS;
        ROWS = DESKTOP_ROWS;
        return;
      }
      const { availableWidth, availableHeight } = getMobileLayoutMetrics();
      const cols = Math.round(availableWidth / MOBILE_TARGET_CELL);
      const rows = Math.round(availableHeight / MOBILE_TARGET_CELL);
      COLS = Math.min(30, Math.max(13, cols));
      ROWS = Math.min(42, Math.max(17, rows));
    }

    function saveHighScore() {
      try {
        localStorage.setItem("arabianCobraHS", String(highScore));
      } catch (_) {}
    }

    let cellSize = 20;
    let snake = [];
    let prevSnake = [];
    let dx = 1;
    let dy = 0;
    let pendingDx = 1;
    let pendingDy = 0;
    let food = { x: 0, y: 0 };
    let score = 0;
    let highScore = Number(
      localStorage.getItem("arabianCobraHS")
        || localStorage.getItem("arabicCobraHS")
        || localStorage.getItem("yallaHabibiHS")
        || 0
    );
    let growthLeft = 0;
    let retiringTail = null;
    let tailAnchor = null;
    let tickMs = BASE_TICK_MS;
    let accum = 0;
    let lastFrame = 0;
    let gameState = "start"; // start | playing | dying | gameover | win
    let inputQueue = [];
    let gameOverTimer = null;
    const DEATH_FREEZE_MS = 380;

    let headGradient = null;
    let headGradientKey = "";
    let appleGradient = null;
    let appleGradientKey = "";

    bestDisplay.textContent = `Best: ${highScore}`;

    function updateMobileCopy() {
      const mobile = isMobileLayout();
      document.getElementById("startInstructions").innerHTML = mobile
        ? "Use the arrows below, swipe, or keyboard to move.<br>Eat apples to grow. Don't hit walls or your tail!"
        : "Use arrow keys or swipe to move.<br>Eat apples to grow. Don't hit walls or your tail!";
    }

    function getMobileLayoutMetrics() {
      const shell = document.querySelector(".game-shell");
      const header = document.querySelector(".game-header");
      const controls = document.getElementById("mobileControls");
      const shellStyles = shell ? getComputedStyle(shell) : null;
      const shellPaddingX = shellStyles
        ? parseFloat(shellStyles.paddingLeft) + parseFloat(shellStyles.paddingRight)
        : 0;
      const shellPaddingY = shellStyles
        ? parseFloat(shellStyles.paddingTop) + parseFloat(shellStyles.paddingBottom)
        : 0;
      const headerHeight = header ? header.offsetHeight : 0;
      const controlsVisible = controls && getComputedStyle(controls).display !== "none";
      const controlsHeight = controlsVisible ? controls.offsetHeight : 0;
      const viewportWidth = window.visualViewport
        ? window.visualViewport.width
        : window.innerWidth;
      const viewportHeight = window.visualViewport
        ? window.visualViewport.height
        : window.innerHeight;

      const borderAllowance = 6; // board-wrap 3px border on each side
      const gap = 14; // small breathing room around the board

      return {
        availableWidth: Math.max(120, viewportWidth - shellPaddingX - borderAllowance),
        availableHeight: Math.max(
          120,
          viewportHeight - shellPaddingY - headerHeight - controlsHeight - borderAllowance - gap
        ),
      };
    }

    function resizeCanvas(force = false) {
      if ((gameState === "playing" || gameState === "dying") && playCellSize !== null && !force) {
        cellSize = playCellSize;
        return;
      }

      if (isMobileLayout()) {
        const { availableWidth, availableHeight } = getMobileLayoutMetrics();
        cellSize = Math.max(6, Math.floor(Math.min(availableWidth / COLS, availableHeight / ROWS)));
        if (!Number.isFinite(cellSize) || cellSize <= 0) {
          cellSize = 6;
        }

        const nextWidth = COLS * cellSize;
        const nextHeight = ROWS * cellSize;
        if (force || canvas.width !== nextWidth || canvas.height !== nextHeight) {
          canvas.width = nextWidth;
          canvas.height = nextHeight;
        }
        canvas.style.width = `${nextWidth}px`;
        canvas.style.height = `${nextHeight}px`;
        canvas.style.transform = "";
        syncHudWidth(nextWidth);

        if (layoutPass < 2 && (availableHeight < 130 || availableWidth < 130)) {
          layoutPass += 1;
          requestAnimationFrame(() => resizeCanvas(force));
        } else {
          layoutPass = 0;
        }
        return;
      }

      layoutPass = 0;
      playCellSize = null;
      canvas.style.transform = "";
      syncHudWidth(null);

      const maxWidth = Math.min(window.innerWidth * 0.95, 740);
      const maxHeight = Math.min(window.innerHeight * 0.62, 540);
      cellSize = Math.max(10, Math.floor(Math.min(maxWidth / COLS, maxHeight / ROWS)));
      const nextWidth = COLS * cellSize;
      const nextHeight = ROWS * cellSize;
      if (force || canvas.width !== nextWidth || canvas.height !== nextHeight) {
        canvas.width = nextWidth;
        canvas.height = nextHeight;
      }
      canvas.style.width = "";
      canvas.style.height = "";
    }

    function cloneSnake(list) {
      return list.map((segment) => ({ x: segment.x, y: segment.y }));
    }

    function resetRound() {
      configureGrid();
      const startX = Math.floor(COLS / 2);
      const startY = Math.floor(ROWS / 2);
      snake = [
        { x: startX, y: startY },
        { x: startX - 1, y: startY },
        { x: startX - 2, y: startY },
      ];
      prevSnake = cloneSnake(snake);
      dx = 1;
      dy = 0;
      pendingDx = 1;
      pendingDy = 0;
      inputQueue = [];
      score = 0;
      growthLeft = 0;
      retiringTail = null;
      tailAnchor = null;
      tickMs = BASE_TICK_MS;
      accum = 0;
      lastFrame = 0;
      clearTimeout(gameOverTimer);
      gameOverTimer = null;
      spawnFood();
      updateScoreDisplay();
    }

    function updateScoreDisplay() {
      scoreDisplay.textContent = `Score: ${score}`;
      bestDisplay.textContent = `Best: ${highScore}`;
    }

    function spawnFood() {
      const occupied = new Set(snake.map((s) => `${s.x},${s.y}`));
      let attempts = 0;
      do {
        food = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
        attempts += 1;
      } while (occupied.has(`${food.x},${food.y}`) && attempts < 500);
    }

    function ensureFoodNotOnSnake() {
      let attempts = 0;
      while (snake.some((segment) => segment.x === food.x && segment.y === food.y) && attempts < 500) {
        spawnFood();
        attempts += 1;
      }
    }

    function queueDirection(nx, ny) {
      if (gameState !== "playing") return;
      if (nx === 0 && ny === 0) return;

      const last = inputQueue.length
        ? inputQueue[inputQueue.length - 1]
        : { x: dx, y: dy };
      if (last.x === -nx && last.y === -ny) return;
      if (last.x === nx && last.y === ny) return;
      inputQueue.push({ x: nx, y: ny });
      if (inputQueue.length > 2) inputQueue.shift();
    }

    function applyQueuedInput() {
      if (!inputQueue.length) return;

      const next = inputQueue.shift();
      if (next.x === -dx && next.y === -dy) return;

      pendingDx = next.x;
      pendingDy = next.y;
    }

    function willCollideWithBody(head) {
      const tailIndex = snake.length - 1;
      for (let i = 1; i < snake.length; i += 1) {
        const tailWillMove = growthLeft <= 0 && snake.length > 1;
        if (i === tailIndex && tailWillMove) continue;
        if (snake[i].x === head.x && snake[i].y === head.y) return true;
      }
      return false;
    }

    function stepGame() {
      applyQueuedInput();

      if (!(pendingDx === -dx && pendingDy === -dy)) {
        dx = pendingDx;
        dy = pendingDy;
      }

      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      const hitWall = head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS;
      if (hitWall) {
        snake.unshift(head);
        beginDeath(false);
        return;
      }

      const willEat = head.x === food.x && head.y === food.y;
      if (willCollideWithBody(head)) {
        snake.unshift(head);
        beginDeath(false);
        return;
      }

      snake.unshift(head);

      if (willEat) {
        score = Math.min(MAX_SCORE, score + 1);
        growthLeft += GROWTH_PER_APPLE;
        tickMs = Math.max(MIN_TICK_MS, tickMs - 0.8);
        updateScoreDisplay();
        spawnFood();
        ensureFoodNotOnSnake();

        if (score >= MAX_SCORE) {
          beginDeath(true);
          return;
        }
      }

      if (growthLeft > 0) {
        growthLeft -= 1;
        retiringTail = null;
        tailAnchor = null;
      } else if (snake.length > 1) {
        retiringTail = { x: snake[snake.length - 1].x, y: snake[snake.length - 1].y };
        tailAnchor = { x: snake[snake.length - 2].x, y: snake[snake.length - 2].y };
        snake.pop();
      } else {
        retiringTail = null;
        tailAnchor = null;
      }

      ensureFoodNotOnSnake();
    }

    function beginDeath(won) {
      gameState = won ? "win" : "dying";
      retiringTail = null;
      tailAnchor = null;
      if (score > highScore) {
        highScore = score;
        saveHighScore();
      }
      updateScoreDisplay();

      clearTimeout(gameOverTimer);
      gameOverTimer = setTimeout(() => finalizeGameOver(won), DEATH_FREEZE_MS);
    }

    function finalizeGameOver(won) {
      gameState = won ? "win" : "gameover";
      playCellSize = null;
      resizeCanvas();
      finalScoreEl.innerHTML = won
        ? `You filled the board!<br>Score: ${score}`
        : `Score: ${score}<br>Best: ${highScore}`;
      gameOverScreen.classList.add("visible");
    }

    function drawBackground() {
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawApple() {
      const cx = food.x * cellSize + cellSize / 2;
      const cy = food.y * cellSize + cellSize / 2;
      const entityScale = getMobileAppleScale();
      const radius = Math.min(cellSize * 0.5, cellSize * 0.4 * entityScale);

      ctx.save();

      ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
      ctx.beginPath();
      ctx.ellipse(cx, cy + radius * 0.55, radius * 0.72, radius * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();

      const appleKey = `${food.x}_${food.y}_${cellSize}`;
      if (appleGradientKey !== appleKey || !appleGradient) {
        appleGradient = ctx.createRadialGradient(
          cx - radius * 0.35,
          cy - radius * 0.35,
          radius * 0.15,
          cx,
          cy,
          radius
        );
        appleGradient.addColorStop(0, "#ff6b6b");
        appleGradient.addColorStop(0.45, "#e63946");
        appleGradient.addColorStop(0.85, "#9d0208");
        appleGradient.addColorStop(1, "#6a040f");
        appleGradientKey = appleKey;
      }

      ctx.fillStyle = appleGradient;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(90, 10, 10, 0.45)";
      ctx.lineWidth = Math.max(1, cellSize * 0.04);
      ctx.stroke();

      ctx.fillStyle = "rgba(255, 255, 255, 0.42)";
      ctx.beginPath();
      ctx.ellipse(cx - radius * 0.28, cy - radius * 0.32, radius * 0.22, radius * 0.14, -0.6, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255, 255, 255, 0.18)";
      ctx.beginPath();
      ctx.ellipse(cx + radius * 0.12, cy - radius * 0.08, radius * 0.1, radius * 0.06, 0.4, 0, Math.PI * 2);
      ctx.fill();

      const stemW = Math.max(2, cellSize * 0.08);
      ctx.strokeStyle = "#5c4033";
      ctx.lineWidth = stemW;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(cx, cy - radius * 0.82);
      ctx.quadraticCurveTo(cx + stemW, cy - radius * 1.15, cx + stemW * 0.5, cy - radius * 1.35);
      ctx.stroke();

      ctx.fillStyle = "#40916c";
      ctx.beginPath();
      ctx.ellipse(cx + radius * 0.38, cy - radius * 1.05, radius * 0.34, radius * 0.18, 0.9, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#2d6a4f";
      ctx.lineWidth = Math.max(1, cellSize * 0.03);
      ctx.beginPath();
      ctx.moveTo(cx + radius * 0.12, cy - radius * 1.0);
      ctx.quadraticCurveTo(cx + radius * 0.38, cy - radius * 1.08, cx + radius * 0.55, cy - radius * 0.95);
      ctx.stroke();

      ctx.restore();
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function getSnakePoints(t) {
      const points = snake.map((curr, i) => {
        let gx = curr.x;
        let gy = curr.y;
        if (i === 0) {
          const prev = prevSnake[0] || curr;
          gx = lerp(prev.x, curr.x, t);
          gy = lerp(prev.y, curr.y, t);
        }
        return {
          x: gx * cellSize + cellSize / 2,
          y: gy * cellSize + cellSize / 2,
        };
      });

      if (retiringTail && tailAnchor) {
        points.push({
          x: lerp(retiringTail.x, tailAnchor.x, t) * cellSize + cellSize / 2,
          y: lerp(retiringTail.y, tailAnchor.y, t) * cellSize + cellSize / 2,
        });
      }

      return points;
    }

    function drawSnakeStroke(points, radius, color) {
      if (!points.length) return;
      if (points.length === 1) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(points[0].x, points[0].y, radius, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = radius * 2;
      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i += 1) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.stroke();
    }

    function getHeadAngle() {
      if (dx === 1) return 0;
      if (dx === -1) return Math.PI;
      if (dy === -1) return -Math.PI / 2;
      return Math.PI / 2;
    }

    function drawPremiumHead(head, headRadius) {
      const angle = getHeadAngle();

      ctx.save();
      ctx.translate(head.x, head.y);
      ctx.rotate(angle);

      ctx.fillStyle = "rgba(0, 0, 0, 0.28)";
      ctx.beginPath();
      ctx.ellipse(headRadius * 0.1 + 1.5, 1.5, headRadius * 1.06, headRadius * 0.9, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(headRadius * 0.1, 0, headRadius * 1.06, headRadius * 0.9, 0, 0, Math.PI * 2);

      const headKey = headRadius.toFixed(2);
      if (headGradientKey !== headKey || !headGradient) {
        headGradient = ctx.createRadialGradient(
          -headRadius * 0.15,
          -headRadius * 0.35,
          headRadius * 0.12,
          headRadius * 0.15,
          0,
          headRadius * 1.1
        );
        headGradient.addColorStop(0, "#bbf7d0");
        headGradient.addColorStop(0.35, "#4ade80");
        headGradient.addColorStop(0.68, "#16a34a");
        headGradient.addColorStop(1, "#14532d");
        headGradientKey = headKey;
      }
      ctx.fillStyle = headGradient;
      ctx.fill();

      ctx.strokeStyle = "#0f3d22";
      ctx.lineWidth = Math.max(1.5, cellSize * 0.05);
      ctx.stroke();

      ctx.fillStyle = "rgba(255, 255, 255, 0.28)";
      ctx.beginPath();
      ctx.ellipse(headRadius * 0.02, -headRadius * 0.38, headRadius * 0.48, headRadius * 0.2, -0.25, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(15, 61, 34, 0.22)";
      ctx.lineWidth = Math.max(1, cellSize * 0.035);
      for (let i = -2; i <= 2; i += 1) {
        ctx.beginPath();
        ctx.arc(-headRadius * 0.08, i * headRadius * 0.17, headRadius * 0.34, -0.85, 0.85);
        ctx.stroke();
      }

      const eyeX = headRadius * 0.44;
      const eyeY = headRadius * 0.33;
      const eyeR = Math.max(3, cellSize * 0.13);

      [[eyeX, -eyeY], [eyeX, eyeY]].forEach(([ex, ey]) => {
        ctx.fillStyle = "rgba(0, 0, 0, 0.18)";
        ctx.beginPath();
        ctx.arc(ex + 0.6, ey + 0.6, eyeR * 1.08, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#ecfdf5";
        ctx.beginPath();
        ctx.arc(ex, ey, eyeR, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#10b981";
        ctx.beginPath();
        ctx.arc(ex + eyeR * 0.1, ey, eyeR * 0.58, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#0f172a";
        ctx.beginPath();
        ctx.arc(ex + eyeR * 0.14, ey, eyeR * 0.32, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "rgba(255, 255, 255, 0.92)";
        ctx.beginPath();
        ctx.arc(ex + eyeR * 0.28, ey - eyeR * 0.26, eyeR * 0.19, 0, Math.PI * 2);
        ctx.fill();
      });

      const nostrilR = Math.max(1.2, cellSize * 0.045);
      ctx.fillStyle = "#0f3d22";
      ctx.beginPath();
      ctx.arc(headRadius * 0.94, -headRadius * 0.15, nostrilR, 0, Math.PI * 2);
      ctx.arc(headRadius * 0.94, headRadius * 0.15, nostrilR, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawSnake(t) {
      const points = getSnakePoints(t);
      if (!points.length) return;

      const entityScale = getMobileEntityScale();
      const bodyRadius = Math.min(cellSize * 0.58, cellSize * 0.48 * entityScale);
      const headRadius = Math.min(cellSize * 0.58, cellSize * 0.48 * entityScale);
      const outlineWidth = Math.max(1.5, cellSize * 0.06 * entityScale);

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      drawSnakeStroke(points, bodyRadius + outlineWidth, "#1a7a28");
      drawSnakeStroke(points, bodyRadius, "#2ecc40");

      drawPremiumHead(points[0], headRadius);

      ctx.restore();
    }

    function render(t) {
      drawBackground();
      drawApple();
      drawSnake(t);
    }

    function gameLoop(timestamp) {
      if (!lastFrame) lastFrame = timestamp;
      const delta = Math.min(48, timestamp - lastFrame);
      lastFrame = timestamp;

      if (gameState === "playing") {
        accum += delta;
        if (accum >= tickMs) {
          prevSnake = cloneSnake(snake);
          stepGame();
          accum -= tickMs;
        }
      } else {
        accum = 0;
      }

      const t = gameState === "playing" ? Math.min(1, accum / tickMs) : 1;
      render(t);
      requestAnimationFrame(gameLoop);
    }

    function startGame() {
      startScreen.classList.remove("visible");
      gameOverScreen.classList.remove("visible");
      resetRound();
      gameState = "playing";
      resizeCanvas(true);
      playCellSize = cellSize;
      canvas.focus();
    }

    function handleDirectionInput(nx, ny) {
      if (gameState === "start" || gameState === "gameover" || gameState === "win") {
        startGame();
      }
      if (gameState === "playing") {
        queueDirection(nx, ny);
      }
    }

    function bindDirectionButtons() {
      const map = {
        up: [0, -1],
        down: [0, 1],
        left: [-1, 0],
        right: [1, 0],
      };

      document.querySelectorAll(".btn[data-dir]").forEach((btn) => {
        const [nx, ny] = map[btn.dataset.dir];

        const press = (event) => {
          event.preventDefault();
          event.stopPropagation();
          btn.classList.add("pressed");
          handleDirectionInput(nx, ny);
        };

        const release = (event) => {
          event.preventDefault();
          btn.classList.remove("pressed");
        };

        btn.addEventListener("pointerdown", press);
        btn.addEventListener("pointerup", release);
        btn.addEventListener("pointercancel", release);
        btn.addEventListener("pointerleave", release);
      });
    }

    document.getElementById("startBtn").addEventListener("click", (event) => {
      event.preventDefault();
      startGame();
    });
    document.getElementById("restartBtn").addEventListener("click", (event) => {
      event.preventDefault();
      startGame();
    });

    document.addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        if (gameState === "start") startGame();
        return;
      }

      if (gameState === "start" && ["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) {
        startGame();
        switch (event.key) {
          case "ArrowUp":
            queueDirection(0, -1);
            break;
          case "ArrowDown":
            queueDirection(0, 1);
            break;
          case "ArrowLeft":
            queueDirection(-1, 0);
            break;
          case "ArrowRight":
            queueDirection(1, 0);
            break;
          default:
            break;
        }
        return;
      }

      if (gameState !== "playing") return;

      switch (event.key) {
        case "ArrowUp":
        case "w":
        case "W":
          queueDirection(0, -1);
          break;
        case "ArrowDown":
        case "s":
        case "S":
          queueDirection(0, 1);
          break;
        case "ArrowLeft":
        case "a":
        case "A":
          queueDirection(-1, 0);
          break;
        case "ArrowRight":
        case "d":
        case "D":
          queueDirection(1, 0);
          break;
        default:
          break;
      }
    });

    let touchStartX = 0;
    let touchStartY = 0;
    let touchActive = false;
    const swipeThreshold = () => (isMobileLayout() ? 40 : 24);

    canvas.addEventListener("touchstart", (event) => {
      if (event.touches.length !== 1) return;
      event.preventDefault();
      const touch = event.touches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      touchActive = true;
      if (gameState === "start") startGame();
    }, { passive: false });

    canvas.addEventListener("touchend", (event) => {
      if (!touchActive) return;
      event.preventDefault();
      touchActive = false;
      if (gameState !== "playing") return;

      const touch = event.changedTouches[0];
      if (!touch) return;

      const dxSwipe = touch.clientX - touchStartX;
      const dySwipe = touch.clientY - touchStartY;
      const absX = Math.abs(dxSwipe);
      const absY = Math.abs(dySwipe);
      const threshold = swipeThreshold();

      if (Math.max(absX, absY) < threshold) return;

      if (absX > absY) {
        queueDirection(dxSwipe > 0 ? 1 : -1, 0);
      } else {
        queueDirection(0, dySwipe > 0 ? 1 : -1);
      }
    }, { passive: false });

    canvas.addEventListener("touchcancel", () => {
      touchActive = false;
    }, { passive: false });

    function handleLayoutChange() {
      clearTimeout(layoutTimer);
      layoutTimer = setTimeout(() => {
        updateMobileCopy();
        if (gameState !== "playing" && gameState !== "dying") {
          configureGrid();
          resizeCanvas();
        }
      }, 200);
    }

    window.addEventListener("resize", handleLayoutChange);
    window.addEventListener("orientationchange", () => {
      setTimeout(() => {
        if (gameState !== "playing" && gameState !== "dying") {
          configureGrid();
          playCellSize = null;
          resizeCanvas(true);
        } else {
          resizeCanvas(true);
          playCellSize = cellSize;
        }
      }, 250);
    });

    function preventMobileZoom() {
      if (!isMobileLayout()) return;

      const gameShell = document.querySelector(".game-shell");
      let lastTouchEnd = 0;
      let lastTouchX = 0;
      let lastTouchY = 0;

      document.addEventListener("gesturestart", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gesturechange", (event) => event.preventDefault(), { passive: false });
      document.addEventListener("gestureend", (event) => event.preventDefault(), { passive: false });

      document.addEventListener("touchstart", (event) => {
        if (event.touches.length > 1) {
          event.preventDefault();
        }
      }, { passive: false });

      document.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        if (!touch) return;

        const now = Date.now();
        const dx = Math.abs(touch.clientX - lastTouchX);
        const dy = Math.abs(touch.clientY - lastTouchY);
        const isDoubleTap = now - lastTouchEnd <= 320 && dx < 36 && dy < 36;

        if (isDoubleTap) {
          event.preventDefault();
        }

        lastTouchEnd = now;
        lastTouchX = touch.clientX;
        lastTouchY = touch.clientY;
      }, { passive: false });

      if (gameShell) {
        gameShell.addEventListener("touchmove", (event) => {
          event.preventDefault();
        }, { passive: false });
      }

      document.addEventListener("dblclick", (event) => {
        event.preventDefault();
      }, { passive: false });
    }

    updateMobileCopy();
    preventMobileZoom();
    configureGrid();
    resizeCanvas();
    requestAnimationFrame(() => resizeCanvas());
    resetRound();
    bindDirectionButtons();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
