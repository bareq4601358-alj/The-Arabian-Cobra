<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YALLA HABIBI 🐍</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0500;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      color: #ffd700;
      touch-action: none;
    }
    h1 {
      margin: 10px 0 8px 0;
      font-size: 2.6rem;
      text-shadow: 0 0 20px #ffd700;
    }
    #scoreDisplay {
      font-size: 1.5rem;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    canvas {
      border: 5px solid #ffd700;
      border-radius: 15px;
      box-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
      background: #1a1208;
      outline: none;
      touch-action: none;
      max-width: 95vw;
      max-height: 70vh;
    }
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 10, 0, 0.97);
      padding: 35px 50px;
      border: 4px solid #ffd700;
      border-radius: 20px;
      text-align: center;
      display: none;
      z-index: 100;
      width: 90%;
      max-width: 380px;
    }
    button {
      margin-top: 20px;
      padding: 14px 40px;
      font-size: 1.3rem;
      background: #ffd700;
      color: #0a0500;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      max-width: 220px;
    }
    button:hover {
      background: #ffed8f;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>YALLA HABIBI 🐍</h1>
  <div id="scoreDisplay">Score: 0 &nbsp;&nbsp;&nbsp; Best: 0</div>
  <canvas id="gameCanvas" tabindex="0"></canvas>

  <div class="game-over" id="gameOverScreen">
    <h2>GAME OVER</h2>
    <p id="finalScore" style="font-size:1.8rem; margin:15px 0;"></p>
    <button onclick="restartGame()">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreEl = document.getElementById('finalScore');

    let grid = 20;
    let cols, rows;
    let snake, dx, dy, food, score, highScore, gameRunning, gameSpeed, lastMoveTime;
    let pendingDx, pendingDy;
    let animationFrameId = null;

    highScore = localStorage.getItem('yallaHabibiHS') || 0;

    function resizeCanvas() {
      const maxSize = Math.min(window.innerWidth * 0.92, window.innerHeight * 0.65, 640);
      const newSize = Math.floor(maxSize / grid) * grid; // Make it divisible by grid
      
      canvas.width = newSize;
      canvas.height = newSize;
      cols = canvas.width / grid;
      rows = canvas.height / grid;
    }

    function initGame() {
      resizeCanvas();
      snake = [{ x: Math.floor(cols/2), y: Math.floor(rows/2) }];
      dx = 1; dy = 0;
      pendingDx = 1; pendingDy = 0;
      score = 0;
      gameSpeed = 85;
      gameRunning = true;
      lastMoveTime = Date.now();
      randomFood();
      updateScoreDisplay();
    }

    function updateScoreDisplay() {
      scoreDisplay.textContent = `Score: ${score}     Best: ${highScore}`;
    }

    function randomFood() {
      do {
        food = {
          x: Math.floor(Math.random() * cols),
          y: Math.floor(Math.random() * rows)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function draw() {
      if (!gameRunning) return;

      const now = Date.now();
      if (now - lastMoveTime < gameSpeed) {
        animationFrameId = requestAnimationFrame(draw);
        return;
      }
      lastMoveTime = now;

      if (!(pendingDx === -dx && pendingDy === -dy)) {
        dx = pendingDx;
        dy = pendingDy;
      }

      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows ||
          snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        updateScoreDisplay();
        if (gameSpeed > 45) gameSpeed -= 2;
        randomFood();
      } else {
        snake.pop();
      }

      ctx.fillStyle = '#0a0500';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      snake.forEach((segment, i) => {
        ctx.fillStyle = i === 0 ? '#ffd700' : '#b8860b';
        ctx.fillRect(segment.x * grid + 1, segment.y * grid + 1, grid - 2, grid - 2);
      });

      ctx.fillStyle = '#ce1126';
      ctx.beginPath();
      ctx.arc(food.x * grid + grid/2, food.y * grid + grid/2, grid/2 - 3, 0, Math.PI * 2);
      ctx.fill();

      animationFrameId = requestAnimationFrame(draw);
    }

    function gameOver() {
      gameRunning = false;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('yallaHabibiHS', highScore);
      }
      finalScoreEl.innerHTML = `Score: ${score}<br>Best: ${highScore}`;
      gameOverScreen.style.display = 'block';
    }

    function restartGame() {
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      gameOverScreen.style.display = 'none';
      initGame();
      draw();
    }

    // Keyboard Controls
    document.addEventListener('keydown', e => {
      if (!gameRunning) return;
      switch(e.key) {
        case 'ArrowUp':    case 'w': case 'W': if (dy !== 1) { pendingDx = 0; pendingDy = -1; } break;
        case 'ArrowDown':  case 's': case 'S': if (dy !== -1) { pendingDx = 0; pendingDy = 1; } break;
        case 'ArrowLeft':  case 'a': case 'A': if (dx !== 1) { pendingDx = -1; pendingDy = 0; } break;
        case 'ArrowRight': case 'd': case 'D': if (dx !== -1) { pendingDx = 1; pendingDy = 0; } break;
      }
    });

    // Mobile Swipe Controls
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
      touchStartY = e.changedTouches[0].screenY;
    });

    canvas.addEventListener('touchend', e => {
      if (!gameRunning) return;
      const diffX = e.changedTouches[0].screenX - touchStartX;
      const diffY = e.changedTouches[0].screenY - touchStartY;

      if (Math.abs(diffX) > Math.abs(diffY)) {
        if (diffX > 40 && dx !== -1) { pendingDx = 1; pendingDy = 0; }
        else if (diffX < -40 && dx !== 1) { pendingDx = -1; pendingDy = 0; }
      } else {
        if (diffY > 40 && dy !== -1) { pendingDx = 0; pendingDy = 1; }
        else if (diffY < -40 && dy !== 1) { pendingDx = 0; pendingDy = -1; }
      }
    });

    // Start Game
    window.onload = () => {
      initGame();
      canvas.focus();
      draw();
    };

    // Handle screen resize
    window.addEventListener('resize', () => {
      if (gameRunning) {
        initGame();
      }
    });
  </script>
</body>
</html>
